    # ── Stage 3: Build (disabled until Dockerfile exists) ─────────────────────

    build:
        name: Build Docker images
        needs: [lint-backend, lint-frontend, type-check, security-scan] # TODO: change to tests when they're done
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Create backend env file
              run: |
                  echo "DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db" > backend/.env.docker

            - name: Build and start stack
              run: docker compose up --build -d

            - name: Wait for backend to be healthy
              run: |
                  echo "Waiting for backend..."
                  for i in {1..30}; do
                    if curl -sf http://localhost:8000/api/v1/health > /dev/null; then
                      echo "Backend is up"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "Backend failed to start"
                  docker compose logs backend
                  exit 1

            - name: Wait for frontend to be healthy
              run: |
                  echo "Waiting for frontend..."
                  for i in {1..30}; do
                    if curl -sf http://localhost:3000 > /dev/null; then
                      echo "Frontend is up"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "Frontend failed to start"
                  exit 1

            - name: Tear down stack
              if: always()
              run: docker compose down -v

    # ── Stage 4: Quality gate (disabled until SonarCloud project is created) ───
    # TODO: add back coverage download steps and update needs to include tests jobs
    sonarcloud:
        name: SonarCloud scan
        needs: [build]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: SonarCloud scan
              uses: SonarSource/sonarcloud-github-action@master
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
