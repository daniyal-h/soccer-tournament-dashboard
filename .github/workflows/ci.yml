name: Soccer Tournament Dashboard CI

permissions:
    contents: read

# This workflow runs on all pulls and pushes
on:
    pull_request:
        branches:
            - "*"
    push:
        branches:
            - "*"

jobs:
    # ── Stage 1: Static analysis (all parallel) ────────────────────────────────

    lint-frontend:
        name: Lint frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Run ESLint
              run: npm run lint
              working-directory: frontend

            - name: Check formatting
              run: npm run format:check
              working-directory: frontend

    type-check:
        name: Type check frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Run TypeScript type check
              run: npx tsc --noEmit
              working-directory: frontend

    lint-backend:
        name: Lint backend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: backend/requirements-dev.txt

            - name: Install dependencies
              run: pip install -r requirements-dev.txt
              working-directory: backend

            - name: Run Ruff linter
              run: ruff check .
              working-directory: backend

            - name: Check formatting
              run: ruff format --check .
              working-directory: backend

    security-scan:
        name: Security scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: |
                      backend/requirements.txt
                      backend/requirements-dev.txt

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Python dependencies
              run: |
                  pip install --upgrade pip
                  pip install pip-audit -r requirements.txt -r requirements-dev.txt
              working-directory: backend

            - name: Install Node dependencies
              run: npm ci
              working-directory: frontend

            - name: Audit Python dependencies
              run: pip-audit
              working-directory: backend

            - name: Audit Node dependencies
              run: npm audit --audit-level=high
              working-directory: frontend

    # ── Stage 2: Tests ─────────────────────────────────────────────────────────

    backend-tests:
        name: Backend tests
        needs: [lint-backend]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: backend/requirements-dev.txt

            - name: Install dependencies
              run: |
                  pip install --upgrade pip
                  pip install -r requirements.txt -r requirements-dev.txt
              working-directory: backend

            - name: Run pytest with coverage
              run: pytest -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
              working-directory: backend
              env:
                  ENVIRONMENT: test
                  SENTRY_DSN: ""
                  DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
                  ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
                  API_FOOTBALL_API_KEY: test_api_key
                  ADMIN_TOKEN: test_token

            - name: Upload backend coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: backend-coverage
                  path: backend/coverage.xml

    frontend-tests:
        name: Frontend tests
        needs: [lint-frontend, type-check]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node
              uses: actions/setup-node@v5
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Run frontend tests with coverage
              run: npm run test:coverage
              working-directory: frontend

            - name: Upload frontend coverage report
              uses: actions/upload-artifact@v4
              with:
                name: frontend-coverage
                path: frontend/coverage/lcov.info

    # ── Stage 3: Build ─────────────────────────────────────────────────────────

    build:
        name: Docker build and smoke test
        needs: [backend-tests, frontend-tests, security-scan]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Create backend env file
              run: |
                  echo "DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db" > backend/.env.docker
                  echo "ADMIN_TOKEN=test-admin-token" >> backend/.env.docker
                  echo "API_FOOTBALL_API_KEY=test_api_key" >> backend/.env.docker

            - name: Build and start stack
              run: docker compose up --build -d

            - name: Wait for backend to be healthy
              run: |
                  echo "Waiting for backend..."
                  for i in {1..30}; do
                    if curl -sf http://localhost:8000/api/v1/health > /dev/null; then
                      echo "Backend is up"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "Backend failed to start"
                  docker compose logs backend
                  exit 1

            - name: Wait for frontend to be healthy
              run: |
                  echo "Waiting for frontend..."
                  for i in {1..30}; do
                    if curl -sf http://localhost:3000 > /dev/null; then
                      echo "Frontend is up"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "Frontend failed to start"
                  exit 1

            - name: Tear down stack
              if: always()
              run: docker compose down -v

    # ── Stage 4: Quality gate ─────────────────────────────────────────────────────────
    sonarcloud:
        name: SonarCloud scan
        needs: [build, backend-tests, frontend-tests]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Download backend coverage report
              uses: actions/download-artifact@v4
              with:
                  name: backend-coverage
                  path: backend

            - name: Download frontend coverage report
              uses: actions/download-artifact@v4
              with:
                name: frontend-coverage
                path: frontend/coverage

            - name: SonarCloud scan
              uses: SonarSource/sonarcloud-github-action@master
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
