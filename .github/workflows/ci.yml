name: Soccer Tournament Dashboard CI

# This workflow runs on all pulls and pushes
on:
    pull_request:
        branches:
            - "*"
    push:
        branches:
            - "*"

jobs:
    # ── Stage 1: Static analysis (all parallel) ────────────────────────────────

    lint-frontend:
        name: Lint frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Run ESLint
              run: npm run lint
              working-directory: frontend

            - name: Check formatting
              run: npm run format:check
              working-directory: frontend

    type-check:
        name: Type check frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Run TypeScript type check
              run: npx tsc --noEmit
              working-directory: frontend

    lint-backend:
        name: Lint backend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: backend/requirements-dev.txt

            - name: Install dependencies
              run: pip install -r requirements-dev.txt
              working-directory: backend

            - name: Run Ruff linter
              run: ruff check .
              working-directory: backend

            - name: Check formatting
              run: ruff format --check .
              working-directory: backend

    security-scan:
        name: Security scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: |
                      backend/requirements.txt
                      backend/requirements-dev.txt

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Python dependencies
              run: pip install pip-audit -r requirements.txt -r requirements-dev.txt
              working-directory: backend

            - name: Install Node dependencies
              run: npm ci
              working-directory: frontend

            - name: Audit Python dependencies
              run: pip-audit
              working-directory: backend

            - name: Audit Node dependencies
              run: npm audit --audit-level=high
              working-directory: frontend

    # ── Stage 2: Tests (disabled until pytest + Vitest are configured) ─────────

