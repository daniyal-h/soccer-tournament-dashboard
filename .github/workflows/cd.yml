name: Soccer Tournament Dashboard CD

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions: {}

jobs:
    # ── Staging: auto-deploys on every push to main ────────────────────────────

    deploy-staging:
        # Frontend deploys automatically through Vercel Git integration

        name: Deploy backend to Render (staging)
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: Staging
        steps:
            - name: Trigger Render staging deploy hook
              run: |
                  curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

            - name: Wait for staging to be healthy
              run: |
                  echo "Waiting for staging backend to be healthy..."
                  for i in {1..20}; do
                    if curl -sf "${{ secrets.RENDER_BACKEND_URL }}/api/v1/health" > /dev/null; then
                      echo "Staging backend is live"
                      exit 0
                    fi
                    sleep 15
                  done
                  echo "Staging backend failed to become healthy"
                  exit 1

    # ── Production: manual promotion via workflow_dispatch ─────────────────────

    deploy-production:
        name: Deploy backend to Render (production)
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        environment: Production
        steps:
            - name: Trigger Render production deploy hook
              run: |
                  curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

            - name: Wait for production to be healthy
              run: |
                  echo "Waiting for production backend to be healthy..."
                  for i in {1..20}; do
                    if curl -sf "${{ secrets.RENDER_BACKEND_URL }}/api/v1/health" > /dev/null; then
                      echo "Production backend is live"
                      exit 0
                    fi
                    sleep 15
                  done
                  echo "Production backend failed to become healthy"
                  exit 1